services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: architect_consultant_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-architect_db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - ./uploads:/app/uploads
